services:
  sigerdu_web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sigerdu_web
    ports:
      # Port 8085 digunakan sesuai request, silakan diubah jika bentrok
      - "8085:80"
    volumes:
      # Untuk persitensi file upload rekam medis/lab (jangan dihapus)
      - ./storage/app/public:/var/www/html/storage/app/public
    env_file:
      - .env
    networks:
      # Nama network eksternal yang ada di server Anda
      # Ubah ke "lapo_aozora_net" jika nama sebenarnya itu
      - aozora_net
    restart: unless-stopped

networks:
  aozora_net:
    external: true
